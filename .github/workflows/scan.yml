name: Meteora LP Screening

# Jalan otomatis tiap ~5 menit (cron GitHub Actions; kadang delay saat sibuk).
# Bisa juga dipicu manual dari tab Actions (workflow_dispatch).
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "scan = pipeline normal | test_notify = kirim contoh notif (data sintetis, bukan real)"
        type: choice
        default: scan
        options:
          - scan
          - test_notify

# Cegah run tumpang tindih: kalau run sebelumnya belum selesai, run baru menunggu
# (bukan membatalkan) supaya penulisan state tak korup / bertabrakan.
concurrency:
  group: meteora-scan
  cancel-in-progress: false

permissions:
  contents: write   # perlu untuk commit balik state_data.json

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # jaring pengaman: jangan sampai run nyangkut

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run screening
        if: ${{ inputs.mode != 'test_notify' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LUNARCRUSH_API_KEY: ${{ secrets.LUNARCRUSH_API_KEY }}
          # Override threshold/bobot lewat repo Variables bila mau (opsional):
          NARRATIVE_ENABLED: ${{ vars.NARRATIVE_ENABLED || 'true' }}
        run: python main.py

      - name: Kirim contoh notifikasi (test_notify, data sintetis)
        if: ${{ inputs.mode == 'test_notify' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python test_notify.py

      - name: Commit state (anti-duplikat + riwayat ATH)
        if: ${{ inputs.mode != 'test_notify' }}
        # Simpan state antar-run dengan commit balik ke repo. Pakai [skip ci]
        # supaya commit ini TIDAK memicu workflow lagi (hindari loop).
        #
        # State di-MERGE level-JSON (state.py, bukan git rebase/merge
        # berbasis baris) -- state_data.json gampang "konflik" di mata git
        # walau isinya semantically bisa digabung (token berbeda). Retry
        # loop LAMA (`git pull --rebase ... || true`) menelan kegagalan
        # rebase itu lalu diam-diam kehilangan SELURUH update run ini (push
        # jadi no-op tapi dilaporkan "state pushed") -- ditemukan nyata saat
        # 2 run beririsan (lihat riwayat commit). Fix: tiap retry, checkout
        # ULANG state_data.json dari origin terbaru, gabung dgn snapshot
        # lokal hasil run ini (state.py --merge: union per-token, tak pernah
        # kehilangan data), baru commit+push.
        run: |
          git config user.name "meteora-bot"
          git config user.email "bot@users.noreply.github.com"
          if [[ -z "$(git status --porcelain state_data.json)" ]]; then
            echo "state tidak berubah, tak ada commit"
            exit 0
          fi
          cp state_data.json /tmp/state_local_snapshot.json
          pushed=0
          # 8 percobaan (naik dari 5) -- dgn run manual/dispatch numpuk beruntun
          # (mis. sesi testing), kontensi bisa lebih panjang drpd cron 5-menit
          # normal. Backoff naik bertahap spy makin lama makin longgar.
          for i in 1 2 3 4 5 6 7 8; do
            git fetch origin ${{ github.ref_name }}
            git checkout origin/${{ github.ref_name }} -- state_data.json
            python state.py /tmp/state_local_snapshot.json
            git add state_data.json
            if git diff --cached --quiet; then
              echo "state hasil merge sama dgn remote, tak perlu commit"
              pushed=1
              break
            fi
            git commit -m "chore(state): update ATH & notif history [skip ci]"
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "state pushed (percobaan $i)"
              pushed=1
              break
            fi
            echo "push gagal (race dgn run lain), retry $i"
            git reset --soft HEAD~1
            sleep $((i*2))
          done
          if [[ "$pushed" -ne 1 ]]; then
            # GAGAL TOTAL -- terlihat jelas di log (bukan lagi silent-loss spt
            # bug lama). Data run ini (price_history/notified/telegram_offset)
            # tak ter-simpan run ini, tapi tak fatal: run berikutnya (~5 menit
            # lagi) tetap jalan normal dari state remote terbaru, cuma
            # kehilangan 1 titik data history utk token yg diproses run ini.
            echo "::warning::GAGAL total push state setelah 8 percobaan -- kontensi terlalu tinggi (banyak run beruntun). Data run ini tak tersimpan, tapi run berikutnya tetap normal."
          fi
